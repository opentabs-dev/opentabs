name: Publish Changed Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/src/**'
      - 'plugins/*/package.json'
      - 'plugins/*/icon.svg'

# Only one publish workflow at a time — queue subsequent runs
concurrency:
  group: publish-plugins
  cancel-in-progress: false

jobs:
  publish:
    # Skip commits made by this workflow (version bumps) to prevent loops
    if: "!startsWith(github.event.head_commit.message, 'chore: auto-publish plugin')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Detect changed plugins
        id: detect
        run: |
          # Use the push event's "before" SHA to detect ALL changes in this push,
          # not just the last commit. This catches multi-commit pushes and rebases.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || echo "$BEFORE" | grep -qE '^0+$'; then
            # First push or force push — fall back to HEAD~1
            BEFORE="HEAD~1"
          fi
          CHANGED_PLUGINS=$(git diff --name-only "$BEFORE" HEAD -- 'plugins/' \
            | grep -oP '^plugins/\K[^/]+' \
            | sort -u \
            | while read -r name; do
                # Only include directories that have a package.json with an opentabs field
                if [ -f "plugins/$name/package.json" ] && \
                   grep -q '"opentabs"' "plugins/$name/package.json" 2>/dev/null; then
                  echo "$name"
                fi
              done)

          if [ -z "$CHANGED_PLUGINS" ]; then
            echo "No plugins to publish"
            echo "plugins=" >> "$GITHUB_OUTPUT"
          else
            echo "Plugins to publish:"
            echo "$CHANGED_PLUGINS"
            JSON=$(echo "$CHANGED_PLUGINS" | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "plugins=$JSON" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump, build, and publish changed plugins
        if: steps.detect.outputs.plugins != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PLUGINS='${{ steps.detect.outputs.plugins }}'
          PUBLISHED=()
          FAILED=()

          for PLUGIN in $(echo "$PLUGINS" | jq -r '.[]'); do
            DIR="plugins/$PLUGIN"
            echo ""
            echo "================================================"
            echo "Publishing: $PLUGIN"
            echo "================================================"

            # Read current version and package name
            CURRENT=$(node -p "require('./$DIR/package.json').version")
            NPM_NAME=$(node -p "require('./$DIR/package.json').name")

            # Compute the next version robustly. `npm view <pkg> version` reflects the
            # 'latest' dist-tag and lags registry propagation; reading it right after a
            # publish elsewhere can return stale data, leading the old equality check to
            # pick an already-taken version and fail with E403 (this silently failed 111
            # plugins once). Instead: base the bump on the 'latest' dist-tag (the
            # maintained line) folded with the local package.json version, then patch-bump
            # past any version that already exists in the full published set. This avoids
            # both E403 collisions and orphan versions (e.g. a stray 0.1.0) hijacking the
            # line. A brand-new package (no published versions) publishes its local version.
            NEW_VERSION=$(
              CURRENT="$CURRENT" node -e "
                const { execSync } = require('node:child_process');
                const name = process.argv[1];
                const current = process.env.CURRENT;
                const semverRe = /^[0-9]+\.[0-9]+\.[0-9]+\$/;
                const parse = v => v.split('.').map(Number);
                const cmp = (a, b) => { const x = parse(a), y = parse(b); for (let i = 0; i < 3; i++) { if (x[i] !== y[i]) return x[i] - y[i]; } return 0; };
                let published = [], latest = '';
                try {
                  const raw = execSync('npm view ' + name + ' versions --json', { stdio: ['ignore', 'pipe', 'ignore'] }).toString().trim();
                  if (raw) { const parsed = JSON.parse(raw); published = Array.isArray(parsed) ? parsed : [parsed]; }
                } catch { /* package not yet on npm — published stays empty */ }
                try {
                  latest = execSync('npm view ' + name + ' dist-tags.latest', { stdio: ['ignore', 'pipe', 'ignore'] }).toString().trim();
                } catch { /* no latest tag */ }
                if (published.length === 0) { console.log(current); process.exit(0); }
                const base = [latest, current].filter(v => semverRe.test(v)).reduce((a, b) => (cmp(a, b) >= 0 ? a : b), '0.0.0');
                const set = new Set(published);
                let [maj, min, pat] = parse(base);
                do { pat++; } while (set.has([maj, min, pat].join('.')));
                console.log([maj, min, pat].join('.'));
              " "$NPM_NAME"
            )

            if [ -z "$NEW_VERSION" ]; then
              echo "::warning::Could not compute next version for $NPM_NAME — skipping"
              FAILED+=("$PLUGIN")
              continue
            fi

            if [ "$NEW_VERSION" != "$CURRENT" ]; then
              echo "Bumping $NPM_NAME: $CURRENT -> $NEW_VERSION"
              NEW_VERSION="$NEW_VERSION" node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$DIR/package.json', 'utf8'));
                pkg.version = process.env.NEW_VERSION;
                fs.writeFileSync('$DIR/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
            else
              echo "Publishing $NPM_NAME@$NEW_VERSION (not yet on npm)"
            fi

            # Install dependencies and full build (tsc + opentabs-plugin build)
            echo "Installing dependencies..."
            (cd "$DIR" && npm install) || {
              echo "::warning::Install failed for $NPM_NAME — skipping publish"
              FAILED+=("$PLUGIN")
              continue
            }

            echo "Building..."
            (cd "$DIR" && npm run build) || {
              echo "::warning::Build failed for $NPM_NAME — skipping publish"
              FAILED+=("$PLUGIN")
              continue
            }

            # Verify the build produced the required artifacts
            if [ ! -f "$DIR/dist/adapter.iife.js" ] || [ ! -f "$DIR/dist/tools.json" ]; then
              echo "::warning::Build incomplete for $NPM_NAME — missing adapter.iife.js or tools.json, skipping publish"
              FAILED+=("$PLUGIN")
              continue
            fi

            # Publish to npm (authenticated via NPM_TOKEN secret)
            echo "Publishing $NPM_NAME@$NEW_VERSION..."
            (cd "$DIR" && npm publish --access public) || {
              echo "::warning::Failed to publish $NPM_NAME@$NEW_VERSION"
              FAILED+=("$PLUGIN")
              continue
            }

            PUBLISHED+=("$PLUGIN")
            echo "Published $NPM_NAME@$NEW_VERSION"
          done

          echo "PUBLISHED=${PUBLISHED[*]}" >> "$GITHUB_ENV"

          echo ""
          echo "Published ${#PUBLISHED[@]} plugin(s); ${#FAILED[@]} failure(s)."
          if [ "${#FAILED[@]}" -gt 0 ]; then
            # A swallowed publish failure previously let the job report success while
            # nothing reached npm. Surface failures as a job failure so they are not
            # silently lost — successful plugins are still committed by the next step.
            echo "::error::Failed to publish: ${FAILED[*]}"
            echo "PUBLISH_FAILED=1" >> "$GITHUB_ENV"
          fi

      - name: Commit version bumps
        if: steps.detect.outputs.plugins != '' && env.PUBLISHED != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          for PLUGIN in $PUBLISHED; do
            git add "plugins/$PLUGIN/package.json" || true
            git add "plugins/$PLUGIN/package-lock.json" || true
          done

          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit --no-verify -m "chore: auto-publish plugin version bumps [skip ci]

          Published: $PUBLISHED"

            # Retry push with rebase to handle concurrent merges to main
            # --no-verify skips pre-push hooks (build already verified above)
            MAX_ATTEMPTS=5
            PUSHED=false
            for attempt in $(seq 1 $MAX_ATTEMPTS); do
              if git push --no-verify; then
                echo "Push succeeded on attempt $attempt"
                PUSHED=true
                break
              fi
              echo "Push failed (attempt $attempt/$MAX_ATTEMPTS), rebasing and retrying..."
              sleep $((attempt * 5))
              git pull --rebase origin main
            done

            if [ "$PUSHED" != "true" ]; then
              echo "::error::Failed to push version bump commit after $MAX_ATTEMPTS attempts"
              exit 1
            fi
          fi

      - name: Fail if any plugin failed to publish
        # Runs after the commit step so successfully published plugins are still
        # recorded. Then fails the job if any plugin failed, so a partial publish
        # is never reported as a green run (the bug that previously hid 111 E403s).
        if: always() && env.PUBLISH_FAILED == '1'
        run: |
          echo "::error::One or more plugins failed to publish — see warnings above."
          exit 1
