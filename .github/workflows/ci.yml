name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Storybook build
        run: npm run storybook:build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unused code check
        run: npm run knip

      - name: Unit tests
        run: npm run test

  e2e:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: '1'
      PW_WORKERS: '3'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build E2E test plugin
        run: cd plugins/e2e-test && npm install && npm run build
        env:
          OPENTABS_SKIP_NOTIFY: '1'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  plugins:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch enough history to diff a PR against its base branch.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build platform
        run: npm run build

      # On a PR, only build + check the plugins the PR actually touches, so an
      # unrelated plugin's pre-existing failure cannot block a contributor.
      # On push to main, check every plugin as the integration gate.
      - name: Build plugins
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            npm run build:plugins:changed -- "--changed=origin/${{ github.base_ref }}"
          else
            npm run build:plugins
          fi

      - name: Check plugins
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run check:plugins:changed -- "--changed=origin/${{ github.base_ref }}"
          else
            npm run check:plugins
          fi

  windows:
    runs-on: windows-latest
    concurrency:
      group: windows-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  windows-e2e:
    needs: windows
    runs-on: windows-latest
    timeout-minutes: 20
    concurrency:
      group: windows-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Windows E2E tests
        shell: pwsh
        run: |
          $env:OPENTABS_REPO_DIR = $PWD.Path
          $env:OPENTABS_RESULTS_DIR = Join-Path $env:RUNNER_TEMP "windows-results"
          powershell -ExecutionPolicy Bypass -File e2e/windows/run-tests.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-e2e-results
          path: ${{ runner.temp }}/windows-results/
          retention-days: 7
