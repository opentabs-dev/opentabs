<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100" fill="none" role="img" aria-label="Slack-color bridging fabric">
  <defs>
    <clipPath id="squareClip">
      <rect x="0" y="0" width="100" height="100"/>
    </clipPath>
  </defs>

  <!-- White square background -->
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>

  <!-- 3x3 woven fabric pattern -->
  <g clip-path="url(#squareClip)" stroke-width="10" stroke-linecap="round">

    <!-- Alternating diagonal lines for weave effect -->
    <!-- A1 (+45°) -->
    <line stroke="#36C5F0" x1="-60" y1="-95" x2="160" y2="125"/>
    <!-- B1 (-45°) -->
    <line stroke="#2EB67D" x1="-60" y1="125" x2="160" y2="-95"/>

    <!-- A2 (+45°) -->
    <line stroke="#ECB22E" x1="-60" y1="-60" x2="160" y2="160"/>
    <!-- B2 (-45°) -->
    <line stroke="#E01E5A" x1="-60" y1="160" x2="160" y2="-60"/>

    <!-- A3 (+45°) -->
    <line stroke="#2EB67D" x1="-60" y1="-25" x2="160" y2="195"/>
    <!-- B3 (-45°) -->
    <line stroke="#36C5F0" x1="-60" y1="195" x2="160" y2="-25"/>
  </g>
</svg>
