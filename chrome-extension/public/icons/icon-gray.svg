<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100" fill="none" role="img" aria-label="Bridge icon (disconnected)">
  <defs>
    <clipPath id="squareClip">
      <rect x="0" y="0" width="100" height="100"/>
    </clipPath>
  </defs>

  <!-- White square background -->
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>

  <!-- 3x3 woven fabric pattern in gray -->
  <g clip-path="url(#squareClip)" stroke-width="10" stroke-linecap="round">
    <line stroke="#9CA3AF" x1="-60" y1="-95" x2="160" y2="125"/>
    <line stroke="#9CA3AF" x1="-60" y1="125" x2="160" y2="-95"/>
    <line stroke="#9CA3AF" x1="-60" y1="-60" x2="160" y2="160"/>
    <line stroke="#9CA3AF" x1="-60" y1="160" x2="160" y2="-60"/>
    <line stroke="#9CA3AF" x1="-60" y1="-25" x2="160" y2="195"/>
    <line stroke="#9CA3AF" x1="-60" y1="195" x2="160" y2="-25"/>
  </g>
</svg>
