<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenTabs</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        padding: 20px;
        min-height: 100vh;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .header img { width: 40px; height: 40px; }
      .header h1 { font-size: 18px; font-weight: 700; }
      .header p { font-size: 11px; color: #888; }
      .section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #666;
        margin-bottom: 8px;
        margin-top: 20px;
      }
      .card {
        background: #141414;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 0;
        overflow: hidden;
      }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid #2a2a2a;
      }
      .item:last-child { border-bottom: none; }
      .item-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .item-left img { width: 24px; height: 24px; }
      .item-label { font-size: 14px; font-weight: 600; }
      .badge {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 4px;
        border: 1px solid;
        min-width: 90px;
        text-align: center;
      }
      .badge.connected {
        background: #052e16;
        border-color: #166534;
        color: #4ade80;
      }
      .badge.disconnected {
        background: #1c1917;
        border-color: #44403c;
        color: #a8a29e;
      }
      #loading {
        text-align: center;
        color: #666;
        padding: 40px 0;
        font-size: 13px;
      }
      #status-content { display: none; }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="../icons/icon.svg" alt="OpenTabs" />
      <div>
        <h1>OpenTabs</h1>
        <p>Turning tabs into tools</p>
      </div>
    </div>

    <div id="loading">Loading status…</div>

    <div id="status-content">
      <div class="section-label">Core</div>
      <div class="card">
        <div class="item">
          <div class="item-left">
            <img src="../icons/icon.svg" alt="Relay" />
            <span class="item-label">Relay</span>
          </div>
          <span id="relay-badge" class="badge disconnected">Disconnected</span>
        </div>
      </div>

      <div class="section-label">Services</div>
      <div class="card" id="services-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <script src="side-panel.js"></script>
  </body>
</html>
